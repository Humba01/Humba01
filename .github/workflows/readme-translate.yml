name: Translate README

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Setup Node.js
        uses: actions/setup-node@v1
        with:
          node-version: 12.x
      # ISO Langusge Codes: https://cloud.google.com/translate/docs/languages  
      - name: Adding README - English
        uses: dephraiim/translate-readme@main
        with:
          LANG: en
      - name: Adding README - French
        uses: dephraiim/translate-readme@main
        with:
          LANG: fr
      - name: Adding README - Deutsch
        uses: dephraiim/translate-readme@main
        with:
          LANG: de
      - name: Adding README - Italian
        uses: dephraiim/translate-readme@main
        with:
          LANG: it
      - name: Adding README - Japonese
        uses: dephraiim/translate-readme@main
        with:
          LANG: ja
      - name: Adding README - Spanish
        uses: dephraiim/translate-readme@main
        with:
          LANG: es
      - name: Adding README - Chinese
        uses: dephraiim/translate-readme@main
        with:
          LANG: zh-CN
      - name: Adding README - Chinese (Tradicional)
        uses: dephraiim/translate-readme@main
        with:
          LANG: zh-TW
      - name: Adding README - Korean
        uses: dephraiim/translate-readme@main
        with:
          LANG: ko
      - name: Adding README - Arabic
        uses: dephraiim/translate-readme@main
        with:
          LANG: ar
      - name: Adding README - Russian
        uses: dephraiim/translate-readme@main
        with:
          LANG: ru
      - name: Adding README - Netherlands
        uses: dephraiim/translate-readme@main
        with:
          LANG: nl
      - name: Adding README - Hindi
        uses: dephraiim/translate-readme@main
        with:
          LANG: hi
      - name: Adding README - Greece
        uses: dephraiim/translate-readme@main
        with:
          LANG: el
      - name: Adding README - Hebrew        
        uses: dephraiim/translate-readme@main
        with:
          LANG: iw
